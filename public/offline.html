<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Errandboi — You're offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .logo {
      font-size: 3.5rem;
      margin-bottom: 1rem;
    }

    .brand {
      font-size: 1.5rem;
      font-weight: 800;
      color: #f97316;
      margin-bottom: 2rem;
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    p {
      color: #94a3b8;
      max-width: 320px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    button {
      background: #f97316;
      color: #fff;
      border: none;
      border-radius: 0.75rem;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #ea6c0a; }
  </style>
</head>
<body>
  <div class="logo">🛵</div>
  <div class="brand">Errandboi</div>
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>
    No internet connection detected. Check your network and try again — your last visited pages are available in the cache.
  </p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
